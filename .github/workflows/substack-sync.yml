name: Substack Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-articles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Detect new articles
        id: detect
        run: |
          set -e
          ADDED=$(git diff --name-status ${{ github.event.before }} ${{ github.sha }} | awk '$1=="A" && $2 ~ /^article-.*\.html$/ {print $2}')
          echo "added<<EOF" >> $GITHUB_OUTPUT
          echo "$ADDED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish new articles to Substack webhook
        if: ${{ steps.detect.outputs.added != '' }}
        env:
          SUBSTACK_WEBHOOK_URL: ${{ secrets.SUBSTACK_WEBHOOK_URL }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          set -e
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              node scripts/substack/publish.js --file "$file"
            fi
          done <<< "${{ steps.detect.outputs.added }}"
